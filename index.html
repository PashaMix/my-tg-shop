<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин Козак</title>
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); margin: 0; padding: 10px; padding-bottom: 100px; }
        .categories-menu { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; scrollbar-width: none; }
        .categories-menu::-webkit-scrollbar { display: none; }
        .cat-btn { background: var(--tg-theme-secondary-bg-color, #eee); color: var(--tg-theme-text-color, #000); border: 1px solid #ccc; padding: 8px 14px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 14px; }
        .cat-btn.active { background: var(--tg-theme-button-color, #3498db); color: var(--tg-theme-button-text-color, #fff); border-color: transparent; }
        .product-card { border: 1px solid #ccc; padding: 15px; border-radius: 8px; margin-bottom: 15px; background: var(--tg-theme-secondary-bg-color, #f9f9f9); display: flex; flex-direction: column; }
        .product-img { width: 100%; max-height: 160px; padding: 10px 0; border-radius: 6px; margin-bottom: 10px; background: #ddd; text-align: center; color: #333; font-weight: bold; }
        .product-title { font-size: 16px; font-weight: bold; margin-bottom: 5px; }
        .product-desc { font-size: 13px; color: #666; margin-bottom: 10px; line-height: 1.4; }
        .product-price { font-size: 16px; font-weight: bold; color: #2ecc71; margin-bottom: 10px; }
        .btn { background: var(--tg-theme-button-color, #3498db); color: var(--tg-theme-button-text-color, #fff); border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 15px; }
        .cart-status { position: fixed; bottom: 0; left: 0; right: 0; background: #333; color: #fff; padding: 15px; text-align: center; }
    </style>
</head>
<body>

    <div class="categories-menu">
        <button class="cat-btn active" onclick="filterCategory('all', this)">Всі товари</button>
        <button class="cat-btn" onclick="filterCategory('sets', this)">🔥 Готові сети</button>
        <button class="cat-btn" onclick="filterCategory('rifles', this)">Гвинтівки</button>
        <button class="cat-btn" onclick="filterCategory('pistols', this)">Пневматичні пістолети</button>
        <button class="cat-btn" onclick="filterCategory('blank', this)">Холості пістолети</button>
        <button class="cat-btn" onclick="filterCategory('flober', this)">Револьвери Флобера</button>
        <button class="cat-btn" onclick="filterCategory('ammo', this)">Набої та кулі</button>
        <button class="cat-btn" onclick="filterCategory('holsters', this)">Кобури</button>
        <button class="cat-btn" onclick="filterCategory('knives', this)">Ножі</button>
    </div>

    <div id="catalog"></div>

    <div id="cart-panel" class="cart-status" style="display: none;">
        <span id="cart-info">В кошику: 0 товарів</span>
        <button class="btn" style="margin-top: 10px; background: #2ecc71;" onclick="checkout()">Оформити замовлення</button>
    </div>

    <script>
        const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
        if (tg) { tg.ready(); tg.expand(); }

        const products = [
            { id: 1, cat: 'sets', name: 'Тактичний Сет: Hatsan FlashPup + Насос + Приціл + 500 куль', price: 19400, desc: 'Повністю готовий до стрільби PCP-комплект. Економічна вигода при купівлі набором!', img: '📦 Комплект Hatsan' },
            { id: 2, cat: 'sets', name: 'Стартовий Сет: Retay XPro + 50 холостих набоїв + Олія', price: 5950, desc: 'Комплект для захисту та тренувань.', img: '📦 Комплект Retay' },
            { id: 3, cat: 'rifles', name: 'Пневматична гвинтівка Kral Puncher Breaker Synthetic (4.5 мм)', price: 15960, desc: 'Потужна PCP гвинтівка (35 Дж) у компонуванні буллпап.', img: '🎯 Kral Puncher' },
            { id: 4, cat: 'rifles', name: 'Пневматична гвинтівка Stoeger RX5 Synthetic Combo', price: 8562, desc: 'Класична пружинно-поршнева модель («переломка»).', img: '🎯 Stoeger RX5' },
            { id: 5, cat: 'pistols', name: 'Пневматичний пістолет Crosman C11 (4.5мм)', price: 3200, desc: 'Газобалонний пістолет (CO2).', img: '🔫 Crosman C11' },
            { id: 6, cat: 'blank', name: 'Стартовий пістолет Retay XPro Black (9мм)', price: 5400, desc: 'Сигнально-шумовий напівавтоматичний пістолет.', img: '💥 Retay XPro' },
            { id: 7, cat: 'flober', name: 'Револьвер Флобера ME 38 Pocket 4R', price: 9800, desc: 'Німецька збірка, калібр 4 мм.', img: '🇪🇺 ME 38 Pocket' },
            { id: 8, cat: 'ammo', name: 'Кулі пневматичні JSB Exact Diablo 4.52 мм (0.547 г, 500 шт)', price: 480, desc: 'Чеські преміум-кулі для точної стрільби.', img: '🔋 JSB Exact' },
            { id: 9, cat: 'ammo', name: 'Холості патроны Ozcursan 9 мм (50 шт)', price: 500, desc: 'Шумові пістолетні набої калібру 9 мм.', img: '🔋 Ozcursan 9мм' },
            { id: 10, cat: 'holsters', name: 'Поясна кобура шкіряна для PM / Retay XPro', price: 450, desc: 'Натуральна шкіра чорного кольору.', img: '💼 Кобура ПМ' },
            { id: 11, cat: 'knives', name: 'Ніж нескладний Grand Way Танто 2307 B', price: 942, desc: 'Міцний тактичний ніж із фіксованим клинком.', img: '🔪 Танто 2307' }
        ];

        let cart = [];

        function renderProducts(filteredList) {
            const catalog = document.getElementById('catalog');
            catalog.innerHTML = '';
            filteredList.forEach(p => {
                catalog.innerHTML += `
                    <div class="product-card">
                        <div class="product-img">${p.img}</div>
                        <div class="product-title">${p.name}</div>
                        <div class="product-desc">${p.desc}</div>
                        <div class="product-price">${p.price} грн</div>
                        <button class="btn" onclick="addToCart('${p.name}', ${p.price})">Додати в кошик</button>
                    </div>
                `;
            });
        }

        function filterCategory(categoryName, buttonElement) {
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
            if (categoryName === 'all') { renderProducts(products); } 
            else { renderProducts(products.filter(p => p.cat === categoryName)); }
        }

        function addToCart(name, price) {
            const item = cart.find(i => i.name === name);
            if (item) { item.quantity += 1; } 
            else { cart.push({ name: name, price: price, quantity: 1 }); }
            updateCartPanel();
        }

        function updateCartPanel() {
            const panel = document.getElementById('cart-panel');
            const info = document.getElementById('cart-info');
            if (cart.length > 0) {
                panel.style.display = 'block';
                info.innerText = `В кошику товарів: ${cart.length} | Сума: ${cart.reduce((sum, item) => sum + (item.price * item.quantity), 0)} грн`;
            } else { panel.style.display = 'none'; }
        }

        function checkout() {
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            let orderText = `📦 НОВЕ ЗАМОВЛЕННЯ\n`;
            cart.forEach(item => {
                orderText += `• ${item.name} x${item.quantity} (${item.price * item.quantity} грн)\n`;
            });
            orderText += `💰 РАЗОМ: ${total} грн`;

            if (tg) {
                tg.sendData(orderText);
                tg.close();
            }
        }

        renderProducts(products);
    </script>
</body>
</html>
