<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин зброї та ножів</title>
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); margin: 0; padding: 10px; padding-bottom: 100px; }
        
        /* Горизонтальное меню категорий */
        .categories-menu { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; scrollbar-width: none; }
        .categories-menu::-webkit-scrollbar { display: none; }
        .cat-btn { background: var(--tg-theme-secondary-bg-color, #eee); color: var(--tg-theme-text-color, #000); border: 1px solid #ccc; padding: 8px 14px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 14px; transition: 0.2s; }
        .cat-btn.active { background: var(--tg-theme-button-color, #3498db); color: var(--tg-theme-button-text-color, #fff); border-color: transparent; }
        
        /* Карточки товаров */
        .product-card { border: 1px solid #ccc; padding: 15px; border-radius: 8px; margin-bottom: 15px; background: var(--tg-theme-secondary-bg-color, #f9f9f9); display: flex; flex-direction: column; }
        .product-img { width: 100%; max-height: 160px; object-fit: cover; border-radius: 6px; margin-bottom: 10px; background: #ddd; text-align: center; line-height: 160px; color: #666; }
        .product-title { font-size: 16px; font-weight: bold; margin-bottom: 5px; }
        .product-desc { font-size: 13px; color: #666; margin-bottom: 10px; line-height: 1.4; }
        .product-price { font-size: 16px; font-weight: bold; color: #2ecc71; margin-bottom: 10px; }
        
        .btn { background: var(--tg-theme-button-color, #3498db); color: var(--tg-theme-button-text-color, #fff); border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 15px; }
        .cart-status { position: fixed; bottom: 0; left: 0; right: 0; background: #333; color: #fff; padding: 15px; text-align: center; }
    </style>
</head>
<body>

    <!-- Меню категорий -->
    <div class="categories-menu">
        <button class="cat-btn active" onclick="filterCategory('all', this)">Всі товари</button>
        <button class="cat-btn" onclick="filterCategory('rifles', this)">Гвинтівки</button>
        <button class="cat-btn" onclick="filterCategory('pistols', this)">Пневматичні пістолети</button>
        <button class="cat-btn" onclick="filterCategory('blank', this)">Холості пістолети</button>
        <button class="cat-btn" onclick="filterCategory('flober', this)">Револьвери Флобера</button>
        <button class="cat-btn" onclick="filterCategory('knives', this)">Ножі</button>
    </div>

    <!-- Каталог -->
    <div id="catalog"></div>

    <!-- Нижняя панель корзины -->
    <div id="cart-panel" class="cart-status" style="display: none;">
        <span id="cart-info">В кошику: 0 товарів</span>
        <button class="btn" style="margin-top: 10px; background: #2ecc71;" onclick="checkout()">Оформити замовлення</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // База данных товаров прямо внутри фронтенда для быстрой работы без туннелей
        const products = [
            { id: 1, cat: 'rifles', name: 'Hatsan FlashPup-S Set (4.5мм)', price: 18500, desc: 'PCP гвинтівка, компонування Bullpup. Комплект із насосом та прицілом 4x32.', img: 'Гвинтівка' },
            { id: 2, cat: 'pistols', name: 'Пневматичний пістолет Crosman C11', price: 3200, desc: 'Калібр 4.5 мм, живлення від балонів CO2. Початкова швидкість кулі 146 м/с.', img: 'Пістолет' },
            { id: 3, cat: 'blank', name: 'Стартовий пістолет Retay XPro (9мм)', price: 5400, desc: 'Сигнально-холостий пістолет для подачі звукових сигналів. Магазин на 14 набоїв.', img: 'Холостий' },
            { id: 4, cat: 'flober', name: 'Револьвер Флобера ME 38 Pocket 4R', price: 9800, desc: 'Калібр 4мм, німецька якість, сталевий нарізний ствол. Висока точність.', img: 'Флобер' },
            { id: 5, cat: 'knives', name: 'Ніж складаний Skif Plus Gidra', price: 850, desc: 'Якісна сталь 3Cr13MoV, надійна фіксація Liner Lock. Для щоденного використання.', img: 'Ніж' }
        ];

        let cart = [];

        // Функция отрисовки товаров
        function renderProducts(filteredList) {
            const catalog = document.getElementById('catalog');
            catalog.innerHTML = '';
            
            filteredList.forEach(p => {
                catalog.innerHTML += `
                    <div class="product-card">
                        <div class="product-img">[ Фото: ${p.img} ]</div>
                        <div class="product-title">${p.name}</div>
                        <div class="product-desc">${p.desc}</div>
                        <div class="product-price">${p.price} грн</div>
                        <button class="btn" onclick="addToCart('${p.name}', ${p.price})">Додати в кошик</button>
                    </div>
                `;
            });
        }

        // Фильтрация при клике на категорию
        function filterCategory(categoryName, buttonElement) {
            // Переключаем активную кнопку в меню
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');

            // Фильтруем массив данных
            if (categoryName === 'all') {
                renderProducts(products);
            } else {
                const filtered = products.filter(p => p.cat === categoryName);
                renderProducts(filtered);
            }
        }

        function addToCart(name, price) {
            const item = cart.find(i => i.name === name);
            if (item) { item.quantity += 1; } 
            else { cart.push({ name: name, price: price, quantity: 1 }); }
            updateCartPanel();
        }

        function updateCartPanel() {
            const panel = document.getElementById('cart-panel');
            const info = document.getElementById('cart-info');
            if (cart.length > 0) {
                panel.style.display = 'block';
                const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                info.innerText = `В кошику товарів: ${cart.length} | Сума: ${total} грн`;
            } else { panel.style.display = 'none'; }
        }

        function checkout() {
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            tg.sendData(JSON.stringify({ cart: cart, total: total }));
            tg.close();
        }

        // Стартовый запуск — показываем все товары
        renderProducts(products);
    </script>
</body>
</html>
